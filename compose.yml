services:
  pr-dashboard:
    build: .
    # image: ghcr.io/ajsutton/pr-dashboard:latest
    container_name: pr-dashboard
    user: "${UID}:${GID}"
    ports:
      - "${BIND_HOST:-127.0.0.1}:3456:3456"
    environment:
      DASHBOARD_REPOS: ${DASHBOARD_REPOS:-}
      DASHBOARD_ALL_REPOS: ${DASHBOARD_ALL_REPOS:-}
      DASHBOARD_DEBUG: ${DASHBOARD_DEBUG:-}
      # Compose runs from a checkout with ./src mounted — restart on changes.
      DASHBOARD_WATCH: "1"
    volumes:
      - "./src:/app/src"
      - "./public:/app/public"
    secrets:
      - gh_token
      - ci_token
    restart: unless-stopped

secrets:
  gh_token:
    file: ./.secrets/gh_token
  ci_token:
    file: ./.secrets/ci_token
