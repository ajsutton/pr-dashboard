<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Server rewrites this base href when BASE_PATH is set (e.g. behind an
         nginx subpath proxy). Keep it before stylesheet/script links so they
         resolve through the proxy. -->
    <base href="/">
    <title>PR Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230a0e1c'/><rect x='10' y='13' width='44' height='10' rx='3' fill='%2325c66a'/><rect x='10' y='27' width='30' height='10' rx='3' fill='%23ffd24a'/><rect x='10' y='41' width='38' height='10' rx='3' fill='%23ff5147'/></svg>" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div id="db-meta" class="db-meta">
      <span id="db-user" class="db-user"></span>
      <span id="db-conn" class="db-conn" data-state="connecting">connecting…</span>
      <span id="db-updated" class="db-updated"></span>
    </div>

    <main class="db-main">
      <section class="db-section db-stats-section" id="db-stats-section">
        <div class="db-stats" id="db-stats" data-any-flipped="false"></div>
      </section>

      <section class="db-section db-queues-section" id="db-queues-section" hidden>
        <h2 class="db-section-title">Merge queue</h2>
        <div class="db-queues" id="db-queues"></div>
      </section>

      <section class="db-section" id="db-stacks-section">
        <h2 class="db-section-title">My PRs</h2>
        <div class="db-stacks" id="db-stacks"></div>
      </section>

      <section class="db-section" id="db-jobs-section">
        <h2 class="db-section-title">Projects</h2>
        <div class="db-jobs" id="db-jobs"></div>
      </section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
